# Stay on Gradle 9.4.x until in-memory PGP signing is reliable again. Gradle 9.5 resolves armored
# keys through PgpSignatoryService and lazy providers; :signMavenPublication then fails in CI with
# MissingValueException when querying the signatory's secret/private key providers. Gradle 9.4
# still materializes in-memory keys eagerly, which works with useInMemoryPgpKeys and ORG_GRADLE_PROJECT_*.
distributionBase=GRADLE_USER_HOME
distributionPath=wrapper/dists
distributionUrl=https\://services.gradle.org/distributions/gradle-9.4.1-bin.zip
networkTimeout=10000
retries=0
retryBackOffMs=500
validateDistributionUrl=true
zipStoreBase=GRADLE_USER_HOME
zipStorePath=wrapper/dists
