name: Dependency submission

# Populates GitHub Dependency graph (enables Dependabot alerts + dependency-review on PRs).
on:
  push:
    branches: [main, master]
    # Match CI: conformance-only pushes do not change Gradle deps; skip so merge checks are not
    # a misleading subset (full CI is also skipped for those paths via ci.yml paths-ignore).
    paths-ignore:
      - "conformance-certificate.json"
      - "conformance-report.json"

permissions:
  contents: write

jobs:
  submit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v6

      - uses: gradle/actions/dependency-submission@v6
