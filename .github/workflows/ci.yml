name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  intentproof-spec:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          repository: IntentProof/intentproof-spec
          path: intentproof-spec

      - uses: actions/setup-node@v4
        with:
          node-version-file: intentproof-spec/.nvmrc
          cache: npm
          cache-dependency-path: intentproof-spec/package-lock.json

      - name: Canonical spec conformance (Vitest oracle)
        run: bash intentproof-spec/scripts/run-conformance.sh intentproof-spec

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build and test
        run: ./gradlew --no-daemon check

  # Scans the published library JAR (runtime deps) — similar in spirit to pip-audit on lockfiles.
  vulnerability-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v4

      - name: Build jar
        run: ./gradlew --no-daemon jar

      - name: Cache Trivy DB
        uses: actions/cache@v4
        with:
          path: .cache/trivy
          key: trivy-db-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml', 'build.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            trivy-db-${{ runner.os }}-

      - name: Trivy vulnerability scan (library JAR)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: build/libs
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: "1"
          scanners: vuln
          vuln-type: library
          cache-dir: ${{ github.workspace }}/.cache/trivy
