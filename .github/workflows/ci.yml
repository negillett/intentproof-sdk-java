name: CI

on:
  push:
    branches: [main, master]
    # Skip when only repo-root conformance JSON changes (artifact refresh commits).
    paths-ignore:
      - "conformance-certificate.json"
      - "conformance-report.json"
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  hardening:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Resolve pinned intentproof-spec revision
        id: spec_pin
        run: |
          set -euo pipefail
          SHA="$(grep -E '^intentproofSpecCommit=' gradle.properties | head -1 | cut -d= -f2)"
          echo "sha=${SHA}" >> "${GITHUB_OUTPUT}"

      - uses: actions/checkout@v6
        with:
          repository: IntentProof/intentproof-spec
          ref: ${{ steps.spec_pin.outputs.sha }}
          fetch-depth: 0
          path: intentproof-spec

      - uses: actions/setup-node@v6
        with:
          node-version-file: intentproof-spec/.nvmrc
          cache: npm
          cache-dependency-path: intentproof-spec/package-lock.json

      - name: SDK hardening contract audit (spec-only + drift guards)
        run: bash intentproof-spec/scripts/check-consumer-hardening.sh "${{ github.workspace }}"

  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - name: Resolve pinned intentproof-spec revision
        id: spec_pin
        run: |
          set -euo pipefail
          SHA="$(grep -E '^intentproofSpecCommit=' gradle.properties | head -1 | cut -d= -f2)"
          echo "sha=${SHA}" >> "${GITHUB_OUTPUT}"

      - uses: actions/checkout@v6
        with:
          repository: IntentProof/intentproof-spec
          ref: ${{ steps.spec_pin.outputs.sha }}
          fetch-depth: 0
          path: intentproof-spec

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v6

      - name: Spec pin guard (matches intentproof-spec checkout)
        run: bash scripts/check-consumer-spec-pin.sh "${{ github.workspace }}/intentproof-spec"

      - name: Generated POJO drift check
        env:
          INTENTPROOF_SPEC_ROOT: ${{ github.workspace }}/intentproof-spec
        run: bash scripts/verify-generated-pojos.sh

      - name: Build and test
        run: ./gradlew --no-daemon check

  # Scans the published library JAR (runtime deps) — similar in spirit to pip-audit on lockfiles.
  vulnerability-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - name: Resolve pinned intentproof-spec revision
        id: spec_pin
        run: |
          set -euo pipefail
          SHA="$(grep -E '^intentproofSpecCommit=' gradle.properties | head -1 | cut -d= -f2)"
          echo "sha=${SHA}" >> "${GITHUB_OUTPUT}"

      - uses: actions/checkout@v6
        with:
          repository: IntentProof/intentproof-spec
          ref: ${{ steps.spec_pin.outputs.sha }}
          fetch-depth: 0
          path: intentproof-spec

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"

      - uses: gradle/actions/setup-gradle@v6

      - name: Build jar
        env:
          INTENTPROOF_SPEC_ROOT: ${{ github.workspace }}/intentproof-spec
        run: ./gradlew --no-daemon jar

      - name: Cache Trivy DB
        uses: actions/cache@v5
        with:
          path: .cache/trivy
          key: trivy-db-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml', 'build.gradle.kts', 'gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            trivy-db-${{ runner.os }}-

      - name: Trivy vulnerability scan (library JAR)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: build/libs
          severity: CRITICAL,HIGH,MEDIUM
          exit-code: "1"
          scanners: vuln
          vuln-type: library
          cache-dir: ${{ github.workspace }}/.cache/trivy
